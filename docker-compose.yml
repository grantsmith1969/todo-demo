version: "3.9"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P Your_password123 -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - db-data:/var/opt/mssql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DatabaseProvider: sqlserver
      ConnectionStrings__DefaultConnection: Server=db;Database=TodoDb;User=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5059:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:

        VITE_GRAPHQL_HTTP: /graphql
        VITE_GRAPHQL_WS: /graphql

    depends_on:
      backend:
        condition: service_started
    ports:
      - "4173:80"

volumes:
  db-data:
